name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Detect unresolved merge markers
        run: |
          if rg -n "^(<<<<<<<|=======|>>>>>>>)" .; then
            echo "Unresolved merge conflict markers detected"
            exit 1
          fi

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Unit tests
        run: cargo test --all-features

  build-binaries:
    name: Build binary (${{ matrix.os }} / ${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: camera-latency-test-linux-amd64
            binary_path: target/x86_64-unknown-linux-gnu/release/camera-latency-test
          - os: macos-14
            target: aarch64-apple-darwin
            artifact_name: camera-latency-test-darwin-arm64
            binary_path: target/aarch64-apple-darwin/release/camera-latency-test

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --bin camera-latency-test

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_path }}
          if-no-files-found: error
